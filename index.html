<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Game for Moshi 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            color: #764ba2;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .difficulty-select {
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 10px 20px;
            margin: 0 5px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .easy-btn {
            background: #4CAF50;
            color: white;
        }
        .hard-btn {
            background: #FF9800;
            color: white;
        }
        .insane-btn {
            background: #f44336;
            color: white;
        }

        .difficulty-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .difficulty-btn.active {
            transform: scale(1.1);
            box-shadow: 0 0 20px currentColor;
        }

        canvas {
            border: 3px solid #764ba2;
            border-radius: 10px;
            background: #f0f0f0;
            margin: 20px 0;
        }

        .timer {
            font-size: 1.5em;
            color: #764ba2;
            margin: 10px 0;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 10px 20px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: #667eea;
            transform: translateY(-2px);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .reward-img {
            max-width: 300px;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .close-btn {
            margin-top: 20px;
            padding: 10px 30px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>💖 Maze Game for Moshi 💖</h1>
        
        <div class="difficulty-select">
            <button class="difficulty-btn easy-btn active" onclick="setDifficulty('easy')">😊 Easy</button>
            <button class="difficulty-btn hard-btn" onclick="setDifficulty('hard')">😤 Hard</button>
            <button class="difficulty-btn insane-btn" onclick="setDifficulty('insane')">🤯 Insane</button>
        </div>

        <canvas id="mazeCanvas" width="400" height="400"></canvas>
        
        <div class="timer">⏱ Time: <span id="timer">0</span>s</div>
        
        <div class="controls">
            <button class="control-btn" onclick="movePlayer('up')">⬆ Up</button>
            <button class="control-btn" onclick="movePlayer('left')">⬅ Left</button>
            <button class="control-btn" onclick="movePlayer('down')">⬇ Down</button>
            <button class="control-btn" onclick="movePlayer('right')">➡ Right</button>
            <button class="control-btn" onclick="resetGame()">🔄 Reset</button>
        </div>
        
        <p style="margin-top: 20px; color: #666;">
            📱 Use arrow keys or buttons to move the ❤️ to the ⭐
        </p>
    </div>

    <div id="winModal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const timerDisplay = document.getElementById('timer');
        
        let mazeSize = 10; // Default easy
        let difficulty = 'easy';
        let maze = [];
        let playerPos = { x: 1, y: 1 };
        let goalPos = { x: 8, y: 8 };
        let startTime;
        let timerInterval;
        let gameWon = false;

        // Generate maze using recursive backtracking
        function generateMaze(size) {
            // Initialize maze with walls
            maze = Array(size).fill().map(() => Array(size).fill(1));
            
            // Create paths
            function carve(x, y) {
                maze[y][x] = 0;
                
                const directions = [
                    [0, -2], [2, 0], [0, 2], [-2, 0]
                ];
                
                // Shuffle directions
                for (let i = directions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [directions[i], directions[j]] = [directions[j], directions[i]];
                }
                
                for (let [dx, dy] of directions) {
                    const newX = x + dx;
                    const newY = y + dy;
                    
                    if (newX > 0 && newX < size - 1 && newY > 0 && newY < size - 1 && maze[newY][newX] === 1) {
                        maze[y + dy/2][x + dx/2] = 0;
                        carve(newX, newY);
                    }
                }
            }
            
            carve(1, 1);
            
            // Set start and goal
            maze[1][1] = 0;
            maze[size-2][size-2] = 0;
            
            playerPos = { x: 1, y: 1 };
            goalPos = { x: size-2, y: size-2 };
        }

        function drawMaze() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const cellSize = canvas.width / mazeSize;
            
            // Draw maze
            for (let y = 0; y < mazeSize; y++) {
                for (let x = 0; x < mazeSize; x++) {
                    if (maze[y][x] === 1) {
                        ctx.fillStyle = '#764ba2';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                        // Add 3D effect
                        ctx.fillStyle = '#9b6fb0';
                        ctx.fillRect(x * cellSize + 2, y * cellSize + 2, cellSize - 4, cellSize - 4);
                        ctx.fillStyle = '#764ba2';
                        ctx.fillRect(x * cellSize + 4, y * cellSize + 4, cellSize - 8, cellSize - 8);
                    } else {
                        ctx.fillStyle = '#f0f0f0';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }
            
            // Draw grid lines
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= mazeSize; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(canvas.width, i * cellSize);
                ctx.stroke();
            }
            
            // Draw goal
            ctx.font = `${cellSize * 0.6}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⭐', goalPos.x * cellSize + cellSize/2, goalPos.y * cellSize + cellSize/2);
            
            // Draw player
            if (!gameWon) {
                ctx.fillText('❤️', playerPos.x * cellSize + cellSize/2, playerPos.y * cellSize + cellSize/2);
            }
        }

        function movePlayer(direction) {
            if (gameWon) return;
            if (!startTime) {
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 100);
            }
            
            let newX = playerPos.x;
            let newY = playerPos.y;
            
            switch(direction) {
                case 'up': newY--; break;
                case 'down': newY++; break;
                case 'left': newX--; break;
                case 'right': newX++; break;
            }
            
            if (newX >= 0 && newX < mazeSize && newY >= 0 && newY < mazeSize && maze[newY][newX] === 0) {
                playerPos.x = newX;
                playerPos.y = newY;
                drawMaze();
                
                if (playerPos.x === goalPos.x && playerPos.y === goalPos.y) {
                    winGame();
                }
            }
        }

        function winGame() {
            gameWon = true;
            clearInterval(timerInterval);
            
            const timeElapsed = Math.floor((Date.now() - startTime) / 1000);
            
            let message;
            let reward;
            
            switch(difficulty) {
                case 'easy':
                    message = `
                        <h2>🎉 Congratulations Moshi! 🎉</h2>
                        <p style="font-size: 1.2em;">You completed the Easy maze!</p>
                        <p style="font-size: 1.5em;">Time: ${timeElapsed}s</p>
                        <div style="font-size: 3em; margin: 20px;">😘💋</div>
                        <p style="font-size: 1.3em; color: #e91e63;"><strong>Your reward: A sweet kiss! 💋</strong></p>
                        <p style="font-style: italic; margin: 10px;">
                            "For Moshi, the most amazing person who makes my heart skip a beat! 💕"
                        </p>
                        <p style="color: #764ba2;">You make every moment special! 🌟</p>
                    `;
                    break;
                    
                case 'hard':
                    message = `
                        <h2>🏆 Incredible Moshi! 🏆</h2>
                        <p style="font-size: 1.2em;">You conquered the Hard maze!</p>
                        <p style="font-size: 1.5em;">Time: ${timeElapsed}s</p>
                        <div style="font-size: 4em; margin: 20px;">
                            <span style="display: inline-block; animation: bounce 0.5s infinite;">💑</span>
                        </div>
                        <p style="font-size: 1.3em; color: #ff6f00;"><strong>Your reward: A picture together! 📸</strong></p>
                        <div style="background: linear-gradient(135deg, #ff6f00, #ff8f00); padding: 15px; border-radius: 10px; margin: 15px 0;">
                            <p style="font-size: 2em;">🖼️💕</p>
                            <p style="color: white;">Best moments captured together!</p>
                        </div>
                        <p style="font-style: italic;">
                            "Every adventure with Moshi is worth remembering forever! 📸💖"
                        </p>
                    `;
                    break;
                    
                case 'insane':
                    message = `
                        <h2>👑 YOU'RE A LEGEND MOSHI! 👑</h2>
                        <p style="font-size: 1.2em;">You beat the INSANE maze!</p>
                        <p style="font-size: 1.5em;">Time: ${timeElapsed}s</p>
                        <div style="position: relative; display: inline-block; margin: 20px;">
                            <img src="data:image/svg+xml,${encodeURIComponent(`
                                <svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
                                    <rect width="200" height="200" fill="%23ff4081"/>
                                    <text x="100" y="100" text-anchor="middle" dominant-baseline="middle" font-size="80">❤️</text>
                                </svg>
                            `)}" alt="Special Reward" class="reward-img"/>
                            <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
                                        background: linear-gradient(45deg, gold, transparent, gold); 
                                        animation: shimmer 2s infinite;"></div>
                        </div>
                        <p style="font-size: 1.5em; color: #ff4081;">
                            <strong>ULTIMATE REWARD: My heart & endless love! 💝</strong>
                        </p>
                        <p style="font-size: 1.2em; margin: 15px;">
                            "For Moshi - The one who makes life an incredible journey! 
                            You've unlocked my heart completely! 🔓💖"
                        </p>
                        <div style="background: linear-gradient(45deg, #ff6b6b, #4ecdc4); 
                                    padding: 10px; border-radius: 10px; color: white; margin: 10px 0;">
                            <p style="font-size: 1.3em;">✨ You're my everything! ✨</p>
                        </div>
                        <p style="color: #764ba2;">Together forever starts now! 🥰💕</p>
                    `;
                    break;
            }
            
            document.getElementById('modalContent').innerHTML = message + `
                <button class="close-btn" onclick="closeModal()">Play Again! 🎮</button>
            `;
            document.getElementById('winModal').style.display = 'flex';
            
            drawMaze();
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            timerDisplay.textContent = elapsed;
        }

        function resetGame() {
            gameWon = false;
            clearInterval(timerInterval);
            startTime = null;
            timerDisplay.textContent = '0';
            
            let size;
            switch(difficulty) {
                case 'easy': size = 10; break;
                case 'hard': size = 20; break;
                case 'insane': size = 30; break;
            }
            mazeSize = size;
            generateMaze(size);
            drawMaze();
        }

        function setDifficulty(level) {
            difficulty = level;
            
            // Update active button
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.${level}-btn`).classList.add('active');
            
            resetGame();
        }

        function closeModal() {
            document.getElementById('winModal').style.display = 'none';
            resetGame();
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    movePlayer('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    movePlayer('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    movePlayer('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    movePlayer('right');
                    break;
            }
        });

        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes bounce {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-10px); }
            }
            
            @keyframes shimmer {
                0% { transform: translateX(-100%); }
                100% { transform: translateX(100%); }
            }
        `;
        document.head.appendChild(style);

        // Initialize game
        generateMaze(10);
        drawMaze();
    </script>
</body>
</html>
