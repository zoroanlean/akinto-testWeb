<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
    <title>5th Monthsary Surprise 💖 | Pabebe Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink: #ff9eb5;
            --dark-pink: #d94f70;
            --bg-start: #2d1b3a;
            --bg-end: #1a1025;
            --card-bg: rgba(255, 240, 245, 0.97);
        }

        body {
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            font-family: 'Segoe UI', 'Playfair Display', Georgia, serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating hearts background */
        .hearts-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-float {
            position: absolute;
            color: rgba(255, 180, 200, 0.3);
            font-size: 2rem;
            animation: floatHeart 7s infinite ease-in-out;
            bottom: -50px;
            opacity: 0;
        }

        @keyframes floatHeart {
            0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-110vh) rotate(40deg) scale(1.2); opacity: 0; }
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .surprise-card {
            position: relative;
            z-index: 10;
            max-width: 750px;
            width: 100%;
            background: linear-gradient(135deg, rgba(255, 240, 245, 0.97) 0%, rgba(255, 220, 230, 0.95) 100%);
            border-radius: clamp(1.5rem, 6vw, 3.5rem);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 3px rgba(255, 200, 210, 0.6), 0 0 40px rgba(255, 120, 160, 0.7);
            padding: clamp(1.8rem, 5vw, 2.8rem) clamp(1.2rem, 4vw, 2.2rem);
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }

        .monthsary-badge {
            background: linear-gradient(120deg, #d94f70, #b33154);
            color: #fff0f3;
            display: inline-block;
            padding: 0.6rem 2rem;
            border-radius: 3rem;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            box-shadow: 0 6px 14px rgba(180, 60, 90, 0.6);
            animation: wiggle 2s infinite;
        }

        h1 {
            font-family: 'Playfair Display', 'Times New Roman', serif;
            font-size: clamp(2rem, 7vw, 3.2rem);
            font-weight: 700;
            color: #4a1e2f;
            text-shadow: 2px 2px 0 rgba(255, 220, 220, 0.8);
            margin-bottom: 0.6rem;
        }

        .nickname-display {
            color: #d94f70;
            font-style: italic;
            font-size: clamp(1rem, 3vw, 1.3rem);
            margin-bottom: 0.5rem;
            animation: sparkle 2s infinite;
        }

        .message-box {
            background: rgba(255, 250, 252, 0.9);
            border-radius: 2rem;
            padding: clamp(1rem, 3vw, 1.5rem);
            margin: 1.2rem 0;
            border: 2px dashed #ffb7c9;
            box-shadow: 0 8px 20px rgba(180, 50, 70, 0.2);
        }

        .typewriter-text {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: #5c2e3b;
            line-height: 1.6;
            min-height: 60px;
            font-weight: 500;
        }

        .cursor::after {
            content: '|';
            animation: blink 1s infinite;
            color: #d94f70;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Love quiz section */
        .quiz-section {
            background: #fff5f8;
            border-radius: 2rem;
            padding: 1.2rem;
            margin: 1.2rem 0;
            border: 1px solid #ffccd5;
        }

        .quiz-question {
            font-weight: 600;
            color: #b33c5a;
            margin-bottom: 0.8rem;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
        }

        .quiz-options {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
        }

        .quiz-btn {
            background: white;
            border: 2px solid #ffb7c9;
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            color: #d94f70;
            transition: all 0.3s;
            font-size: 0.9rem;
            flex: 1 1 auto;
            min-width: 100px;
            touch-action: manipulation;
        }

        .quiz-btn:hover {
            background: #ffd9e5;
            transform: scale(1.05);
        }
        .quiz-btn.correct {
            background: #ff9eb5;
            color: white;
            animation: bounceIn 0.6s;
        }
        .quiz-btn.wrong {
            background: #ddd;
            color: #999;
            text-decoration: line-through;
        }

        .quiz-result {
            margin-top: 0.8rem;
            font-weight: bold;
            color: #b33c5a;
            display: none;
            animation: bounceIn 0.6s;
        }

        /* ILY More counter */
        .ily-counter {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.2rem 0;
            flex-wrap: wrap;
        }

        .ily-btn {
            background: #ffeaf1;
            border: none;
            font-size: 1.8rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            color: #d94f70;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .ily-btn:active {
            transform: scale(0.9);
            background: #ffccd5;
        }

        .ily-display {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: 700;
            color: #b33c5a;
            min-width: 120px;
        }

        /* Compliment generator */
        .compliment-box {
            background: linear-gradient(135deg, #fff0f3, #ffe4e9);
            border-radius: 2rem;
            padding: 1.2rem;
            margin: 1.2rem 0;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: #b33c5a;
            font-weight: 600;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            animation: bounceIn 0.5s;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #ffccd5;
            user-select: none;
        }

        .compliment-box:active {
            transform: scale(0.97);
        }

        .surprise-btn {
            background: linear-gradient(180deg, #e8617c 0%, #be3b58 100%);
            border: none;
            color: white;
            font-weight: bold;
            font-size: clamp(1rem, 3vw, 1.3rem);
            padding: 1rem 2.5rem;
            border-radius: 3rem;
            margin-top: 1rem;
            cursor: pointer;
            box-shadow: 0 7px 0 #872c44, 0 10px 18px rgba(160, 30, 60, 0.4);
            transition: all 0.15s;
            letter-spacing: 1px;
            border: 1px solid #ffb2c4;
            animation: wiggle 3s infinite;
            touch-action: manipulation;
        }

        .surprise-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #631f32;
        }

        .hidden-message {
            margin-top: 1.5rem;
            background: #fff0f3;
            border-radius: 2rem;
            padding: 1.2rem;
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            color: #ad2e4c;
            font-weight: 600;
            border: 2px solid #ffb7c9;
            animation: bounceIn 0.6s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        footer {
            margin-top: 1.2rem;
            color: #864455;
            font-size: clamp(0.7rem, 2vw, 0.8rem);
        }

        .nickname-input-area {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 0.8rem 0;
        }

        .nickname-input {
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            border: 2px solid #ffb7c9;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
            background: #fffbfc;
            color: #5c2e3b;
            font-weight: 500;
            flex: 1 1 150px;
            max-width: 200px;
        }

        .save-nickname-btn {
            background: #ffb7c9;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            color: white;
            font-weight: 600;
            background: #d94f70;
            touch-action: manipulation;
        }
    </style>
</head>
<body>

<div class="hearts-bg" id="heartsContainer"></div>

<main class="surprise-card">
    <div class="monthsary-badge">
        <i class="fas fa-calendar-alt"></i> 5th Monthsary <i class="fas fa-heart"></i>
    </div>

    <h1>My Dearesttttttttttttttttttttttttttt</h1>
    <div class="nickname-display" id="nicknameDisplay">
        <i class="fas fa-sparkles"></i> baby <i class="fas fa-sparkles"></i>
    </div>

    <!-- Set nickname -->
    <div class="nickname-input-area">
        <input type="text" class="nickname-input" id="nicknameInput" placeholder="Tawag mo sakin? 🥺" maxlength="20">
        <button class="save-nickname-btn" id="saveNicknameBtn">
            <i class="fas fa-heart"></i> Set
        </button>
    </div>

    <!-- Typewriter love letter -->
    <div class="message-box">
        <p class="typewriter-text cursor" id="typewriterText"></p>
    </div>

    <!-- Pabebe love quiz -->
    <div class="quiz-section">
        <p class="quiz-question" id="quizQuestion">Sino pinaka pogi/maganda sa mundo? 🤔</p>
        <div class="quiz-options" id="quizOptions"></div>
        <p class="quiz-result" id="quizResult"></p>
    </div>

    <!-- I love you more counter -->
    <div class="ily-counter">
        <button class="ily-btn" id="ilyMinus"><i class="fas fa-minus"></i></button>
        <div class="ily-display">
            <span id="ilyCount">1</span>x I love you more! 💕
        </div>
        <button class="ily-btn" id="ilyPlus"><i class="fas fa-plus"></i></button>
    </div>

    <!-- Random compliment -->
    <div class="compliment-box" id="complimentBox">
        <i class="fas fa-sparkles"></i> 
        <span id="complimentText">Click me for kilig! 💖</span>
        <i class="fas fa-sparkles"></i>
    </div>

    <button class="surprise-btn" id="revealButton">
        <i class="fas fa-gift"></i> Open Your Surprise <i class="fas fa-gift"></i>
    </button>

    <div id="specialMessage" style="display: none;" class="hidden-message">
        <i class="fas fa-key"></i>
        <span>You have my whole heart for my whole life. 💍✨ Happy 5th monthsary, my love!</span>
        <i class="fas fa-key"></i>
    </div>

    <footer>
        <i class="far fa-heart"></i> made with love & magic <i class="far fa-heart"></i>
    </footer>
</main>

<script>
    (function() {
        // --- FLOATING HEARTS ---
        const heartsContainer = document.getElementById('heartsContainer');
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-float';
            const icons = ['fa-heart', 'fa-heart', 'fa-heart', 'fa-kiss-wink-heart', 'fa-heartbeat', 'fa-grin-hearts'];
            heart.innerHTML = `<i class="fas ${icons[Math.floor(Math.random() * icons.length)]}"></i>`;
            heart.style.left = `${Math.random() * 100}%`;
            heart.style.fontSize = `${1.2 + Math.random() * 2.2}rem`;
            heart.style.animationDuration = `${5 + Math.random() * 10}s`;
            heart.style.animationDelay = `${Math.random() * 5}s`;
            heartsContainer.appendChild(heart);
            setTimeout(() => { if (heart.parentNode) heart.remove(); }, 16000);
        }
        for (let i = 0; i < 20; i++) setTimeout(createFloatingHeart, i * 150);
        setInterval(createFloatingHeart, 800);

        // --- NICKNAME SYSTEM ---
        const nicknameDisplay = document.getElementById('nicknameDisplay');
        const nicknameInput = document.getElementById('nicknameInput');
        const saveNicknameBtn = document.getElementById('saveNicknameBtn');

        saveNicknameBtn.addEventListener('click', () => {
            const name = nicknameInput.value.trim();
            if (name) {
                nicknameDisplay.innerHTML = `<i class="fas fa-sparkles"></i> ${name} <i class="fas fa-sparkles"></i>`;
                localStorage.setItem('babyNickname', name);
                // Hearts burst
                for (let i = 0; i < 6; i++) setTimeout(createFloatingHeart, i * 60);
            }
        });

        // Load saved nickname
        const savedName = localStorage.getItem('babyNickname');
        if (savedName) {
            nicknameDisplay.innerHTML = `<i class="fas fa-sparkles"></i> ${savedName} <i class="fas fa-sparkles"></i>`;
        }

        // --- TYPEWRITER EFFECT ---
        const typewriterText = document.getElementById('typewriterText');
        const loveMessages = [
            "Five months ago, you walked into my life and painted it with colors I never knew existed... 💕",
            "Every moment with you is my favorite melody, my happy pill, my everything... 🎵",
            "Thank you for being my happiness, my calm, and my greatest adventure... ✨",
            "You're the reason I smile for no reason. Charot! Pero true... 🥺💖",
            "Here's to forever, starting with today. I love you so much! 💍"
        ];
        let messageIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function typeEffect() {
            const currentMsg = loveMessages[messageIndex];
            if (isDeleting) {
                typewriterText.textContent = currentMsg.substring(0, charIndex - 1);
                charIndex--;
                if (charIndex === 0) {
                    isDeleting = false;
                    messageIndex = (messageIndex + 1) % loveMessages.length;
                    setTimeout(typeEffect, 500);
                    return;
                }
            } else {
                typewriterText.textContent = currentMsg.substring(0, charIndex + 1);
                charIndex++;
                if (charIndex === currentMsg.length) {
                    isDeleting = true;
                    setTimeout(typeEffect, 2000);
                    return;
                }
            }
            setTimeout(typeEffect, isDeleting ? 30 : 60);
        }
        typeEffect();

        // --- LOVE QUIZ ---
        const quizQuestion = document.getElementById('quizQuestion');
        const quizOptions = document.getElementById('quizOptions');
        const quizResult = document.getElementById('quizResult');

        const quizData = [
            {
                question: "Sino pinaka pogi/maganda sa mundo? 🤔",
                options: ["Ikaw syempre! 😍", "Si crush...jk", "Si Mama", "Ewan ko 🤷"],
                correct: 0
            },
            {
                question: "Mahal mo ba ko? 🥺",
                options: ["Oo naman! 💖", "Medyo lang", "Depende sa mood", "Secret 🤫"],
                correct: 0
            },
            {
                question: "Sino nagmamay-ari ng puso mo? 💘",
                options: ["Ikaw lang!", "Si Lord", "Family ko", "Wala pa"],
                correct: 0
            }
        ];
        let currentQuiz = 0;

        function loadQuiz() {
            const quiz = quizData[currentQuiz];
            quizQuestion.textContent = quiz.question;
            quizOptions.innerHTML = '';
            quizResult.style.display = 'none';

            quiz.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-btn';
                btn.textContent = opt;
                btn.addEventListener('click', () => checkAnswer(index, btn));
                quizOptions.appendChild(btn);
            });
        }

        function checkAnswer(index, clickedBtn) {
            const quiz = quizData[currentQuiz];
            const allBtns = quizOptions.querySelectorAll('.quiz-btn');

            allBtns.forEach(b => b.disabled = true);

            if (index === quiz.correct) {
                clickedBtn.classList.add('correct');
                quizResult.textContent = "Tama! Alam mo yan eh! 😍💖";
                quizResult.style.color = '#b33c5a';
                for (let i = 0; i < 8; i++) setTimeout(createFloatingHeart, i * 60);
            } else {
                clickedBtn.classList.add('wrong');
                allBtns[quiz.correct].classList.add('correct');
                quizResult.textContent = "HMP! Alam mong ikaw yung sagot eh! 🙄💕";
                quizResult.style.color = '#d94f70';
            }

            quizResult.style.display = 'block';
            quizResult.style.animation = 'none';
            quizResult.offsetHeight;
            quizResult.style.animation = 'bounceIn 0.6s';

            // Next quiz after delay
            setTimeout(() => {
                currentQuiz = (currentQuiz + 1) % quizData.length;
                loadQuiz();
            }, 2000);
        }
        loadQuiz();

        // --- I LOVE YOU MORE COUNTER ---
        const ilyCount = document.getElementById('ilyCount');
        const ilyMinus = document.getElementById('ilyMinus');
        const ilyPlus = document.getElementById('ilyPlus');
        let ilyValue = parseInt(localStorage.getItem('ilyCounter') || '1');

        ilyCount.textContent = ilyValue;

        function updateILY(change) {
            ilyValue = Math.max(1, ilyValue + change);
            ilyCount.textContent = ilyValue;
            localStorage.setItem('ilyCounter', ilyValue);
            ilyCount.style.animation = 'none';
            ilyCount.offsetHeight;
            ilyCount.style.animation = 'bounceIn 0.4s';
            for (let i = 0; i < 4; i++) setTimeout(createFloatingHeart, i * 50);
        }

        ilyPlus.addEventListener('click', () => updateILY(1));
        ilyMinus.addEventListener('click', () => updateILY(-1));

        // --- RANDOM COMPLIMENT GENERATOR ---
        const complimentBox = document.getElementById('complimentBox');
        const complimentText = document.getElementById('complimentText');
        const compliments = [
            "You're the sunshine in my rainy days! ☀️💖",
            "Grabe, ang pogi/ganda mo lalo today! 😍✨",
            "You make my heart do the cha-cha! 💃💕",
            "Ikaw na talaga ang the best! 🏆💘",
            "Ang swerte ko sayo, sobra! 🍀💗",
            "You're my happy pill! 💊💖",
            "Walang katulad ang smile mo! 😊✨",
            "You're my answered prayer! 🙏💕",
            "Kinikilig ako sayo palagi! 🦋💓",
            "You're my person, my home! 🏠💞"
        ];

        complimentBox.addEventListener('click', () => {
            const random = compliments[Math.floor(Math.random() * compliments.length)];
            complimentText.textContent = random;
            complimentText.style.animation = 'none';
            complimentText.offsetHeight;
            complimentText.style.animation = 'bounceIn 0.5s';
            for (let i = 0; i < 5; i++) setTimeout(createFloatingHeart, i * 60);
        });

        // --- SURPRISE BUTTON ---
        const revealBtn = document.getElementById('revealButton');
        const specialMessageDiv = document.getElementById('specialMessage');

        revealBtn.addEventListener('click', function() {
            if (specialMessageDiv.style.display === 'none' || !specialMessageDiv.style.display) {
                specialMessageDiv.style.display = 'flex';
                revealBtn.innerHTML = '<i class="fas fa-heart"></i> Kilig! <i class="fas fa-heart"></i>';
                specialMessageDiv.style.animation = 'none';
                specialMessageDiv.offsetHeight;
                specialMessageDiv.style.animation = 'bounceIn 0.6s';
                for (let i = 0; i < 10; i++) setTimeout(createFloatingHeart, i * 60);
            } else {
                specialMessageDiv.style.display = 'none';
                revealBtn.innerHTML = '<i class="fas fa-gift"></i> Open Your Surprise <i class="fas fa-gift"></i>';
            }
        });

        // --- TOUCH FEEDBACK ---
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.94)';
            }, {passive: true});
            btn.addEventListener('touchend', function() {
                this.style.transform = '';
            }, {passive: true});
        });

    })();
</script>
</body>
</html>
