<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Game for Moshi 💕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 { color: #764ba2; margin-bottom: 15px; font-size: 2em; }

        .difficulty-select {
            margin-bottom: 15px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .easy-btn { background: #4CAF50; color: white; }
        .hard-btn { background: #FF9800; color: white; }
        .insane-btn { background: #f44336; color: white; }

        .difficulty-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .difficulty-btn.active {
            transform: scale(1.05);
            box-shadow: 0 0 15px currentColor;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
            font-weight: bold;
        }

        .moves-counter, .timer {
            font-size: 1.1em;
            color: #764ba2;
            padding: 5px 15px;
            background: #f0e6ff;
            border-radius: 15px;
        }

        canvas {
            border: 3px solid #764ba2;
            border-radius: 10px;
            background: #fafafa;
            margin: 10px 0;
            max-width: 100%;
            height: auto;
        }

        .direction-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            justify-content: center;
            margin: 10px 0;
        }

        .dir-btn {
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dir-btn:hover { background: #667eea; transform: scale(1.05); }
        .dir-btn:active { transform: scale(0.95); }

        .controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .control-btn {
            padding: 10px 20px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .control-btn:hover { background: #667eea; transform: translateY(-2px); }
        .hint-btn { background: #ff9800; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            animation: slideIn 0.5s;
            max-height: 80vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translate(0); opacity: 1; }
        }

        .close-btn {
            margin-top: 15px;
            padding: 12px 30px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .close-btn:hover { background: #667eea; transform: scale(1.05); }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .sparkle-text { animation: sparkle 1s infinite; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>💖 Maze Game for Moshi 💖</h1>

        <div class="difficulty-select">
            <button class="difficulty-btn easy-btn active" onclick="setDifficulty('easy')">😊 Easy</button>
            <button class="difficulty-btn hard-btn" onclick="setDifficulty('hard')">😤 Hard</button>
            <button class="difficulty-btn insane-btn" onclick="setDifficulty('insane')">🤯 Insane</button>
        </div>

        <div class="game-info">
            <span class="moves-counter">👣 Moves: <strong id="moves">0</strong></span>
            <span class="timer">⏱ Time: <strong id="timer">0</strong>s</span>
        </div>

        <canvas id="mazeCanvas" width="380" height="380"></canvas>

        <div class="direction-pad">
            <div></div>
            <button class="dir-btn" onclick="movePlayer('up')">⬆️</button>
            <div></div>
            <button class="dir-btn" onclick="movePlayer('left')">⬅️</button>
            <button class="dir-btn" onclick="showHint()" style="background: #ff9800; font-size: 16px;">💡</button>
            <button class="dir-btn" onclick="movePlayer('right')">➡️</button>
            <div></div>
            <button class="dir-btn" onclick="movePlayer('down')">⬇️</button>
            <div></div>
        </div>

        <div class="controls">
            <button class="control-btn" onclick="resetGame()">🔄 New Game</button>
            <button class="control-btn hint-btn" onclick="showHint()">💡 Hint</button>
        </div>

        <p style="margin-top: 10px; color: #888; font-size: 0.9em;">
            📱 Arrow keys or buttons • Reach ⭐ to win!
        </p>
    </div>

    <div id="winModal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const timerDisplay = document.getElementById('timer');
        const movesDisplay = document.getElementById('moves');

        let mazeSize = 10;
        let difficulty = 'easy';
        let maze = [];
        let playerPos = { x: 1, y: 1 };
        let goalPos = { x: 8, y: 8 };
        let startTime = null;
        let timerInterval = null;
        let gameWon = false;
        let moves = 0;
        let solutionPath = [];
        let hintPath = [];

        // Generate maze using recursive backtracking
        function generateMaze(size) {
            maze = Array.from({ length: size }, () => Array(size).fill(1));

            function carve(x, y) {
                maze[y][x] = 0;
                const dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]].sort(() => Math.random() - 0.5);
                for (const [dx, dy] of dirs) {
                    const nx = x + dx, ny = y + dy;
                    if (nx > 0 && nx < size - 1 && ny > 0 && ny < size - 1 && maze[ny][nx] === 1) {
                        maze[y + dy / 2][x + dx / 2] = 0;
                        carve(nx, ny);
                    }
                }
            }

            carve(1, 1);
            maze[1][1] = 0;
            maze[size - 2][size - 2] = 0;

            // Ensure goal cell has at least one open neighbor
            const gx = size - 2, gy = size - 2;
            const neighbors = [[gx, gy - 1], [gx - 1, gy], [gx, gy + 1], [gx + 1, gy]];
            if (!neighbors.some(([nx, ny]) => ny >= 0 && ny < size && nx >= 0 && nx < size && maze[ny][nx] === 0)) {
                maze[gy][gx - 1] = 0;
                if (gx - 2 > 0) maze[gy][gx - 2] = 0;
            }
        }

        // BFS to find solution path — guarantees maze is solvable
        function findSolutionPath() {
            const q = [{ x: playerPos.x, y: playerPos.y, path: [{ x: playerPos.x, y: playerPos.y }] }];
            const vis = new Set([`${playerPos.x},${playerPos.y}`]);

            while (q.length) {
                const { x, y, path } = q.shift();
                if (x === goalPos.x && y === goalPos.y) {
                    solutionPath = path;
                    // Build sparse hint path (every ~5th step)
                    const step = Math.max(1, Math.floor(path.length / 6));
                    hintPath = [];
                    for (let i = 0; i < path.length; i += step) hintPath.push(path[i]);
                    if (!hintPath.some(p => p.x === goalPos.x && p.y === goalPos.y))
                        hintPath.push(path[path.length - 1]);
                    return true;
                }
                for (const [dx, dy] of [[0, -1], [1, 0], [0, 1], [-1, 0]]) {
                    const nx = x + dx, ny = y + dy, k = `${nx},${ny}`;
                    if (nx >= 0 && nx < mazeSize && ny >= 0 && ny < mazeSize && maze[ny][nx] === 0 && !vis.has(k)) {
                        vis.add(k);
                        q.push({ x: nx, y: ny, path: [...path, { x: nx, y: ny }] });
                    }
                }
            }
            return false; // no solution
        }

        function drawMaze() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cs = canvas.width / mazeSize;

            for (let y = 0; y < mazeSize; y++) {
                for (let x = 0; x < mazeSize; x++) {
                    if (maze[y][x] === 1) {
                        const gradient = ctx.createLinearGradient(x * cs, y * cs, (x + 1) * cs, (y + 1) * cs);
                        gradient.addColorStop(0, '#9b6fb0');
                        gradient.addColorStop(0.5, '#764ba2');
                        gradient.addColorStop(1, '#5a2d82');
                        ctx.fillStyle = gradient;
                        ctx.fillRect(x * cs, y * cs, cs, cs);
                        ctx.fillStyle = 'rgba(255,255,255,0.1)';
                        ctx.fillRect(x * cs + 2, y * cs + 2, cs - 4, cs / 2);
                    } else {
                        ctx.fillStyle = '#fafafa';
                        ctx.fillRect(x * cs, y * cs, cs, cs);
                    }
                }
            }

            // Grid lines
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= mazeSize; i++) {
                ctx.beginPath(); ctx.moveTo(i * cs, 0); ctx.lineTo(i * cs, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * cs); ctx.lineTo(canvas.width, i * cs); ctx.stroke();
            }

            // Hint overlay
            if (window.showingHint && hintPath.length > 0) {
                hintPath.forEach(point => {
                    ctx.fillStyle = 'rgba(255,152,0,0.3)';
                    ctx.fillRect(point.x * cs, point.y * cs, cs, cs);
                    ctx.fillStyle = '#ff9800';
                    ctx.font = `${cs * 0.5}px Arial`;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('•', point.x * cs + cs / 2, point.y * cs + cs / 2);
                });
            }

            // Goal
            ctx.fillStyle = 'rgba(255,215,0,0.3)';
            ctx.beginPath();
            ctx.arc(goalPos.x * cs + cs / 2, goalPos.y * cs + cs / 2, cs * 0.6, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = `${cs * 0.7}px Arial`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('⭐', goalPos.x * cs + cs / 2, goalPos.y * cs + cs / 2);

            // Player
            if (!gameWon) {
                ctx.fillStyle = 'rgba(255,0,0,0.2)';
                ctx.beginPath();
                ctx.arc(playerPos.x * cs + cs / 2, playerPos.y * cs + cs / 2, cs * 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = `${cs * 0.7}px Arial`;
                ctx.fillText('❤️', playerPos.x * cs + cs / 2, playerPos.y * cs + cs / 2);
            }
        }

        function movePlayer(direction) {
            if (gameWon) return;
            if (!startTime) {
                startTime = Date.now();
                timerInterval = setInterval(() => {
                    timerDisplay.textContent = Math.floor((Date.now() - startTime) / 1000);
                }, 100);
            }

            let { x, y } = playerPos;
            if (direction === 'up') y--;
            else if (direction === 'down') y++;
            else if (direction === 'left') x--;
            else if (direction === 'right') x++;
            else return;

            if (x >= 0 && x < mazeSize && y >= 0 && y < mazeSize && maze[y][x] === 0) {
                playerPos = { x, y };
                moves++;
                movesDisplay.textContent = moves;
                window.showingHint = false;
                drawMaze();
                if (playerPos.x === goalPos.x && playerPos.y === goalPos.y) winGame();
            }
        }

        function showHint() {
            if (gameWon) return;
            window.showingHint = !window.showingHint;
            drawMaze();
            if (window.showingHint) {
                setTimeout(() => { window.showingHint = false; drawMaze(); }, 1500);
            }
        }

        function winGame() {
            gameWon = true;
            clearInterval(timerInterval);
            const timeElapsed = Math.floor((Date.now() - startTime) / 1000);

            let message;
            switch (difficulty) {
                case 'easy':
                    message = `
                        <h2 style="color:#4CAF50;">🎉 Yehey Moshi! 🎉</h2>
                        <p style="font-size:1.3em;">Easy mode cleared!</p>
                        <div style="font-size:4em;animation:heartBeat 0.5s infinite;">😘💋</div>
                        <p style="font-size:1.1em;">⏱ Time: <strong>${timeElapsed}s</strong> | 👣 Moves: <strong>${moves}</strong></p>
                        <div style="background:#ffe0f0;padding:15px;border-radius:15px;margin:15px 0;">
                            <p style="font-size:1.5em;color:#e91e63;">💋 Reward: Sweet Kiss!</p>
                            <p style="font-style:italic;color:#666;">"For Moshi, you make my heart smile! Mwaaah! 💕"</p>
                        </div>`;
                    break;
                case 'hard':
                    message = `
                        <h2 style="color:#FF9800;">🏆 Galing Moshi! 🏆</h2>
                        <p style="font-size:1.3em;">Hard mode conquered!</p>
                        <div style="font-size:4em;">📸💑</div>
                        <p style="font-size:1.1em;">⏱ Time: <strong>${timeElapsed}s</strong> | 👣 Moves: <strong>${moves}</strong></p>
                        <div style="background:linear-gradient(135deg,#ffe0b2,#ffcc80);padding:15px;border-radius:15px;margin:15px 0;">
                            <p style="font-size:1.5em;color:#e65100;">📸 Reward: Picture Together!</p>
                            <div style="background:white;padding:10px;border-radius:10px;margin:10px 0;border:3px dashed #ff9800;">
                                <p style="font-size:3em;">🖼️</p>
                                <p style="font-style:italic;">"Every moment with Moshi is picture perfect! 📸💖"</p>
                            </div>
                        </div>`;
                    break;
                case 'insane':
                    message = `
                        <h2 style="color:#f44336;">👑 LEGENDARY MOSHI! 👑</h2>
                        <p style="font-size:1.3em;">INSANE mode beaten!</p>
                        <div style="font-size:4em;animation:heartBeat 0.3s infinite;">💝</div>
                        <p style="font-size:1.1em;">⏱ Time: <strong>${timeElapsed}s</strong> | 👣 Moves: <strong>${moves}</strong></p>
                        <div style="background:linear-gradient(135deg,#ff4081,#7c4dff);padding:15px;border-radius:15px;margin:15px 0;color:white;">
                            <p style="font-size:1.5em;">🌟 ULTIMATE REWARD 🌟</p>
                            <p style="font-size:1.2em;">My Heart & Endless Love!</p>
                            <div style="font-size:3em;margin:10px 0;">💍💖✨</div>
                            <p style="font-style:italic;font-size:1.1em;">"Ikaw lang sapat na! Forever and always! 🔐💕"</p>
                            <p class="sparkle-text" style="font-size:1.3em;margin-top:10px;">✨ You're my everything! ✨</p>
                        </div>`;
                    break;
            }

            document.getElementById('modalContent').innerHTML = message +
                `<button class="close-btn" onclick="closeModal()">🔄 Play Again!</button>`;
            document.getElementById('winModal').style.display = 'flex';
            if (difficulty === 'insane') createConfetti();
            drawMaze();
        }

        function createConfetti() {
            const colors = ['#ff4081','#ff6e40','#ffab00','#00e676','#2979ff','#d500f9'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.style.cssText = `position:fixed;top:-20px;left:${Math.random()*100}%;width:${Math.random()*10+5}px;height:${Math.random()*10+5}px;background:${colors[Math.floor(Math.random()*colors.length)]};pointer-events:none;z-index:1001;animation:fall ${Math.random()*2+2}s linear forwards;border-radius:${Math.random()>0.5?'50%':'0'};`;
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 3000);
                }, i * 30);
            }
        }

        function resetGame() {
            gameWon = false;
            clearInterval(timerInterval);
            startTime = null;
            timerDisplay.textContent = '0';
            moves = 0;
            movesDisplay.textContent = '0';
            window.showingHint = false;

            switch (difficulty) {
                case 'easy': mazeSize = 10; break;
                case 'hard': mazeSize = 20; break;
                case 'insane': mazeSize = 30; break;
            }

            goalPos = { x: mazeSize - 2, y: mazeSize - 2 };
            playerPos = { x: 1, y: 1 };

            // Keep regenerating until a solvable maze is found
            let attempts = 0;
            do {
                generateMaze(mazeSize);
                playerPos = { x: 1, y: 1 };
            } while (!findSolutionPath() && ++attempts < 20);

            drawMaze();
        }

        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.${level}-btn`).classList.add('active');
            resetGame();
        }

        function closeModal() {
            document.getElementById('winModal').style.display = 'none';
            resetGame();
        }

        document.addEventListener('keydown', (e) => {
            const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right', w: 'up', s: 'down', a: 'left', d: 'right', W: 'up', S: 'down', A: 'left', D: 'right' };
            if (map[e.key]) { e.preventDefault(); movePlayer(map[e.key]); }
            if (e.key === 'h' || e.key === 'H') showHint();
        });

        window.addEventListener('keydown', e => {
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
        }, { passive: false });

        const styleSheet = document.createElement('style');
        styleSheet.textContent = `@keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }`;
        document.head.appendChild(styleSheet);

        // Start!
        resetGame();
    </script>
</body>
</html>
